command:
- ${env}
- python
- -m
- ${program}
- ${args}
method: bayes
metric:
  goal: maximize
  name: epoch/accuracy
parameters:
  batch_size:
    value: 64
  data_path:
    value: NormWear/data
  decay_rate:
    distribution: log_uniform
    max: -0.19
    min: -5.75
  dropout_rate:
    distribution: uniform
    max: 0.3
    min: 0
  epochs:
    value: 150
  group:
    value: 1
  initial_learning_rate:
    distribution: log_uniform
    max: -6.9
    min: -11
  metric:
    distribution: categorical
    values:
    - accuracy
    - val_accuracy
  model_name:
    value: normwear
  model_weight_dir:
    value: NormWear/weights/normwear_pretrain_ckpt.pth
  num_runs:
    value: 1
  number_of_layer:
    distribution: int_uniform
    max: 10
    min: 3
  prepare_embed:
    value: 0
  regularization_parameter:
    distribution: log_uniform
    max: -1.6
    min: -9.2
  remark:
    value: test_run
program: NormWear.downstream_main
